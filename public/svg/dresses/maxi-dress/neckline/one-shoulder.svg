<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- One-shoulder: single strap on left, open right -->
  <path d="M60,68 C64,66 70,64 78,62 C80,60 82,56 86,52 L94,52 C92,56 92,62 95,66 C110,64 125,66 138,72" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Single strap -->
  <path d="M82,56 L86,52 L94,52 L92,58" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Open right side indicator -->
  <path d="M138,72 L142,76" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,2"/>
  <!-- Facing stitch -->
  <path d="M62,70 C66,68 72,66 80,64 C82,62 85,58 88,54" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
