<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Keyhole back: small circular opening with narrow slit below -->
  <!-- Back outline context -->
  <path d="M70,65 L68,150 M130,65 L132,150" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Back neckline -->
  <path d="M70,65 C80,62 90,60 97,60 M103,60 C110,60 120,62 130,65" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Keyhole circle -->
  <circle cx="100" cy="68" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Keyhole slit below circle -->
  <path d="M98,75 L98,100 M102,75 L102,100" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M98,100 C99,102 100,103 100,103 C100,103 101,102 102,100" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
