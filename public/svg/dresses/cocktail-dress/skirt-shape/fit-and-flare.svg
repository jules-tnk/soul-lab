  <!-- Fitted hip section -->
  <path d="M68,150 C65,165 64,175 64,185" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M132,150 C135,165 136,175 136,185" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Flare seam line -->
