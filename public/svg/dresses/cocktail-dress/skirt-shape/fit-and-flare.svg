  <path d="M136,185 C145,190 156,200 162,220" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <path d="M40,218 L160,218" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
