<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Off-shoulder sleeve: fabric drapes off shoulder, short puffed sleeve below shoulder line -->
  <path d="M45,82 C60,76 78,72 100,70 C122,72 140,76 155,82 L155,92 C140,88 122,84 100,82 C78,84 60,88 45,92 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sleeve continuing below off-shoulder edge -->
  <path d="M45,82 L38,100 L52,100 L45,92" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155,82 L162,100 L148,100 L155,92" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hem stitch -->
  <path d="M39,98 L51,98" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M149,98 L161,98" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
