  <path d="M96,95 L98,95 M102,95 L104,95" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M96,105 L98,105 M102,105 L104,105" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M96,115 L98,115 M102,115 L104,115" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M96,125 L98,125 M102,125 L104,125" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M96,135 L98,135 M102,135 L104,135" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M96,145 L98,145 M102,145 L104,145" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Zipper pull tab -->
