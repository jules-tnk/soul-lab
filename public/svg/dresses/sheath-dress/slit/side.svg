  <!-- Left side slit gap -->
  <path d="M65,225 C63,230 63,245 65,250" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Slit opening marker -->
  <path d="M65,225 C66,222 68,220 68,220" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hem stitch -->
