  <!-- Slit opening indicator -->
  <path d="M97,220 C98,218 100,216 100,215 C100,216 102,218 103,220" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Slit edge stitching -->
  <path d="M99,220 L99,250" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Hem stitch -->
  <path d="M67,248 L95,248 M105,248 L133,248" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
