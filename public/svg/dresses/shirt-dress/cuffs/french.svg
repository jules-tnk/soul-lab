<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- French cuff: double cuff folded back, cufflink detail -->
  <!-- Folded double cuff - wider -->
  <path d="M36,200 L52,200 L52,224 L36,224 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fold line at midpoint -->
  <path d="M36,212 L52,212" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Cufflink holes -->
  <circle cx="44" cy="207" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="44" cy="218" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Cufflink connecting bar -->
  <line x1="44" y1="205" x2="44" y2="220" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Right cuff -->
  <path d="M148,200 L164,200 L164,224 L148,224 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M148,212 L164,212" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="156" cy="207" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="156" cy="218" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <line x1="156" y1="205" x2="156" y2="220" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
