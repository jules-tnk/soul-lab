  <path d="M36,214 L52,214" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M36,217 L52,217" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M36,220 L52,220" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Gather marks vertical -->
  <path d="M38,208 C38,212 38,216 38,224" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2"/>
  <path d="M42,208 C42,212 42,216 42,224" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2"/>
