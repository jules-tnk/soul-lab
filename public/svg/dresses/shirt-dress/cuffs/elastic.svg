  <path d="M50,208 C50,212 50,216 50,224" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- Right cuff -->
  <path d="M148,208 L164,208 L164,224 L148,224 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M148,211 L164,211" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M148,214 L164,214" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M148,217 L164,217" fill="none" stroke="currentColor" stroke-width="1"/>
  <path d="M148,220 L164,220" fill="none" stroke="currentColor" stroke-width="1"/>
