<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Button-down collar: points buttoned to shirt -->
  <!-- Collar band -->
  <path d="M80,62 C88,58 94,56 100,56 C106,56 112,58 120,62 L120,68 L80,68 Z" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left collar leaf with collar button at point -->
  <path d="M80,62 C74,65 66,70 62,77 L69,79 C73,74 77,68 80,66 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right collar leaf -->
  <path d="M120,62 C126,65 134,70 138,77 L131,79 C127,74 123,68 120,66 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Collar point buttons -->
  <circle cx="68" cy="79" r="2.5" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1"/>
  <circle cx="132" cy="79" r="2.5" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1"/>
</svg>
