<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Camp collar: open, flat, no button at top, wide lapel-like opening -->
  <!-- Left collar/lapel: flat, splayed open -->
  <path d="M80,62 C76,64 70,68 65,76 C68,78 75,76 82,72 L84,68 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right collar/lapel -->
  <path d="M120,62 C124,64 130,68 135,76 C132,78 125,76 118,72 L116,68 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Open neckline (no top button) -->
  <path d="M84,68 L100,80 L116,68" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Collar stitch -->
  <path d="M67,74 C72,76 78,75 82,72" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M133,74 C128,76 122,75 118,72" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
