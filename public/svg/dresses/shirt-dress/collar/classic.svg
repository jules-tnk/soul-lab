<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Classic shirt collar: folded collar with collar band -->
  <!-- Collar band -->
  <path d="M80,62 C88,58 94,56 100,56 C106,56 112,58 120,62 L120,68 L80,68 Z" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left collar leaf -->
  <path d="M80,62 C75,64 68,68 65,74 C68,76 75,74 80,72 L80,68 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right collar leaf -->
  <path d="M120,62 C125,64 132,68 135,74 C132,76 125,74 120,72 L120,68 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Collar points -->
  <path d="M65,74 L72,78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M135,74 L128,78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Button -->
  <circle cx="100" cy="72" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
</svg>
