<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Surplice/crossover V: one panel overlaps at angle -->
  <!-- Right panel edge coming to center -->
  <path d="M125,65 C118,70 110,78 105,88 L100,95 L65,88" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left panel edge crossing over -->
  <path d="M75,65 C80,70 88,80 95,90 L100,95 L135,88" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Overlap shading -->
  <path d="M95,70 C98,78 100,88 100,95" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M70,68 L75,65" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M130,68 L125,65" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
