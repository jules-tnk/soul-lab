  <!-- Boning lines -->
  <line x1="82" y1="68" x2="82" y2="148" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="100" y1="66" x2="100" y2="148" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="118" y1="68" x2="118" y2="148" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Horizontal seam at bust -->
