<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Sleeveless tunic: no sleeves, armhole visible at shoulder -->
  <!-- Left armhole curve -->
  <path d="M66,65 L50,80 L44,100"
    stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Right armhole curve -->
  <path d="M134,65 L150,80 L156,100"
    stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Armhole binding/hem line -->
  <path d="M66,65 Q55,78 44,100" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <path d="M134,65 Q145,78 156,100" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <!-- Shoulder seam marks -->
  <line x1="66" y1="65" x2="134" y2="65" stroke="currentColor" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
