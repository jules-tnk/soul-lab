<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Henley neckline: round neck with short button placket below -->
  <!-- Round neckline -->
  <path d="M82,44 Q100,66 118,44"
    stroke="currentColor" stroke-width="1.5" fill="none"/>
  <path d="M82,44 Q100,66 118,44 L115,44 Q100,62 85,44 Z"
    fill="currentColor" fill-opacity="0.07" stroke="none"/>
  <!-- Short button placket below neckline -->
  <rect x="95" y="65" width="10" height="32" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1"/>
  <!-- Buttons -->
  <circle cx="100" cy="72" r="2" fill="currentColor" fill-opacity="0.4"/>
  <circle cx="100" cy="82" r="2" fill="currentColor" fill-opacity="0.4"/>
  <circle cx="100" cy="92" r="2" fill="currentColor" fill-opacity="0.4"/>
</svg>
