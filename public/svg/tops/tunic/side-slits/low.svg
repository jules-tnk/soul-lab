<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Low side slits: small slits at hem, opening about 20px from hem -->
  <!-- Left side slit -->
  <line x1="46" y1="200" x2="46" y2="240" stroke="currentColor" stroke-width="1.5"/>
  <path d="M46,240 L40,260" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Right side slit -->
  <line x1="154" y1="200" x2="154" y2="240" stroke="currentColor" stroke-width="1.5"/>
  <path d="M154,240 L160,260" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Hem -->
  <line x1="40" y1="260" x2="160" y2="260" stroke="currentColor" stroke-width="1.5"/>
  <!-- Slit gap highlight -->
  <line x1="42" y1="242" x2="44" y2="258" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="158" y1="242" x2="156" y2="258" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
