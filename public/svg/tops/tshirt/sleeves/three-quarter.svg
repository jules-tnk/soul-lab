    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right sleeve -->
  <path d="M137,65 L165,85 L172,108 L158,113 L146,170 L130,170 L126,113 L126,90 L137,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Hem fold at three-quarter length -->
  <line x1="42" y1="166" x2="70" y2="166" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="130" y1="166" x2="158" y2="166" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
