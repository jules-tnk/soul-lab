<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Split hem: side slits cut upward from hem at both sides -->
  <rect x="42" y="242" width="116" height="8"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left side slit -->
  <path d="M42,242 L42,268" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <path d="M54,242 L54,268" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Right side slit -->
  <path d="M146,242 L146,268" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <path d="M158,242 L158,268" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Slit fill -->
  <rect x="42" y="242" width="12" height="26" fill="currentColor" fill-opacity="0.05"/>
  <rect x="146" y="242" width="12" height="26" fill="currentColor" fill-opacity="0.05"/>
</svg>
