<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Racerback: Y-shaped back with straps angling to center spine -->
  <!-- Outer body -->
  <path d="M68,65 L50,78 L44,95 L53,250 L147,250 L156,95 L150,78 L132,65"
    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="53" y1="250" x2="147" y2="250" stroke="currentColor" stroke-width="1.5"/>
  <!-- Y-shaped racerback straps converging at spine center -->
  <path d="M68,65 L90,105 L100,108 L110,105 L132,65"
    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Center spine line -->
  <line x1="100" y1="108" x2="100" y2="250" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Fill back panel areas -->
  <path d="M68,65 L50,78 L44,95 L53,250 L100,250 L100,108 L90,105 Z"
    fill="currentColor" fill-opacity="0.07" stroke="none"/>
  <path d="M132,65 L150,78 L156,95 L147,250 L100,250 L100,108 L110,105 Z"
    fill="currentColor" fill-opacity="0.07" stroke="none"/>
</svg>
