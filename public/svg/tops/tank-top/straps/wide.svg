<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Wide straps: thick shoulder straps on a tank-top -->
  <!-- Left strap -->
  <path d="M68,65 L55,65 L55,95 L72,95 L72,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right strap -->
  <path d="M132,65 L145,65 L145,95 L128,95 L128,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Stitch lines -->
  <line x1="58" y1="68" x2="58" y2="92" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="142" y1="68" x2="142" y2="92" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
