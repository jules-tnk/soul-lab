<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Pleats: folded fabric pleats on front panel -->
  <rect x="80" y="78" width="40" height="110"
    fill="currentColor" fill-opacity="0.07" stroke="none"/>
  <!-- Pleat fold lines with fold shadow -->
  <!-- Left pleat -->
  <line x1="88" y1="80" x2="88" y2="186" stroke="currentColor" stroke-width="1.5"/>
  <line x1="94" y1="80" x2="94" y2="186" stroke="currentColor" stroke-width="0.75"/>
  <path d="M88,80 L94,80 L94,186 L88,186" fill="currentColor" fill-opacity="0.07" stroke="none"/>
  <!-- Center pleat -->
  <line x1="100" y1="80" x2="100" y2="186" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right pleat -->
  <line x1="106" y1="80" x2="106" y2="186" stroke="currentColor" stroke-width="0.75"/>
  <line x1="112" y1="80" x2="112" y2="186" stroke="currentColor" stroke-width="1.5"/>
  <path d="M106,80 L112,80 L112,186 L106,186" fill="currentColor" fill-opacity="0.07" stroke="none"/>
</svg>
