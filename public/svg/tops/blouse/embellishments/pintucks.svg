<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Pintucks: narrow vertical tuck lines stitched on front panel -->
  <rect x="80" y="78" width="40" height="110"
    fill="currentColor" fill-opacity="0.07" stroke="none"/>
  <!-- Pintuck lines — pairs of close parallel lines -->
  <line x1="89" y1="80" x2="89" y2="186" stroke="currentColor" stroke-width="1.5"/>
  <line x1="91" y1="80" x2="91" y2="186" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="99" y1="80" x2="99" y2="186" stroke="currentColor" stroke-width="1.5"/>
  <line x1="101" y1="80" x2="101" y2="186" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="109" y1="80" x2="109" y2="186" stroke="currentColor" stroke-width="1.5"/>
  <line x1="111" y1="80" x2="111" y2="186" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,2"/>
</svg>
