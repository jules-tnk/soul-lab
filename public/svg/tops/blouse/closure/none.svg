<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- No closure: open front, no fastening -->
  <!-- Left front panel edge -->
  <line x1="96" y1="65" x2="88" y2="200" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right front panel edge -->
  <line x1="104" y1="65" x2="112" y2="200" stroke="currentColor" stroke-width="1.5"/>
  <!-- Open gap shading -->
  <path d="M96,65 L88,200 L112,200 L104,65 Z"
    fill="currentColor" fill-opacity="0.07" stroke="none"/>
</svg>
