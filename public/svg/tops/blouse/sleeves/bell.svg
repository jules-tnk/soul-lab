  <path d="M62,65 L32,88 L27,108 L40,114 L40,150 Q26,168 18,196 L72,196 Q70,168 68,150 L70,114 L72,88 L62,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Flare line at elbow -->
  <line x1="40" y1="150" x2="68" y2="150" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Right bell sleeve -->
  <path d="M138,65 L168,88 L173,108 L160,114 L160,150 Q174,168 182,196 L128,196 Q130,168 132,150 L130,114 L128,88 L138,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="132" y1="150" x2="160" y2="150" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
