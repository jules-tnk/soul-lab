<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Turnback cuff: cuff is folded back/turned up to show contrasting inside, decorative -->
  <!-- Left sleeve end -->
  <rect x="36" y="190" width="34" height="12"
    fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.5"/>
  <!-- Turnback fold: folded portion shown as darker band below -->
  <rect x="36" y="202" width="34" height="10"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <!-- Fold crease line -->
  <line x1="36" y1="202" x2="70" y2="202" stroke="currentColor" stroke-width="2"/>
  <!-- Decorative stitch on turned-back portion -->
  <line x1="38" y1="207" x2="68" y2="207" stroke="currentColor" stroke-width="0.75" stroke-dasharray="2,2"/>
  <!-- Right -->
  <rect x="130" y="190" width="34" height="12"
    fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.5"/>
  <rect x="130" y="202" width="34" height="10"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <line x1="130" y1="202" x2="164" y2="202" stroke="currentColor" stroke-width="2"/>
  <line x1="132" y1="207" x2="162" y2="207" stroke="currentColor" stroke-width="0.75" stroke-dasharray="2,2"/>
</svg>
