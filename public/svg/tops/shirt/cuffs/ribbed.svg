    fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="1.5"/>
  <!-- Vertical rib lines -->
  <line x1="40" y1="196" x2="40" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="44" y1="196" x2="44" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="48" y1="196" x2="48" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="52" y1="196" x2="52" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="56" y1="196" x2="56" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="60" y1="196" x2="60" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="64" y1="196" x2="64" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="68" y1="196" x2="68" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <!-- Right ribbed band -->
  <rect x="130" y="196" width="34" height="14"
    fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="1.5"/>
  <line x1="134" y1="196" x2="134" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="138" y1="196" x2="138" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="142" y1="196" x2="142" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="146" y1="196" x2="146" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="150" y1="196" x2="150" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="154" y1="196" x2="154" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="158" y1="196" x2="158" y2="210" stroke="currentColor" stroke-width="0.75"/>
  <line x1="162" y1="196" x2="162" y2="210" stroke="currentColor" stroke-width="0.75"/>
