<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Double chest pockets: two patch pockets, one on each side of chest -->
  <!-- Left pocket -->
  <rect x="66" y="105" width="22" height="22"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <rect x="68" y="107" width="18" height="18"
    fill="none" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,2"/>
  <!-- Right pocket -->
  <rect x="112" y="105" width="22" height="22"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <rect x="114" y="107" width="18" height="18"
    fill="none" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,2"/>
</svg>
