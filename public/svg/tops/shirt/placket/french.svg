<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- French placket: wide decorative placket with stitching lines on both sides -->
  <rect x="88" y="68" width="24" height="178"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Double stitching lines along both edges -->
  <line x1="91" y1="70" x2="91" y2="244" stroke="currentColor" stroke-width="0.75" stroke-dasharray="4,3"/>
  <line x1="109" y1="70" x2="109" y2="244" stroke="currentColor" stroke-width="0.75" stroke-dasharray="4,3"/>
  <!-- Buttons -->
  <circle cx="100" cy="95"  r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="122" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="149" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="176" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="203" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="230" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
</svg>
