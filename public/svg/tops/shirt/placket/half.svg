<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Half placket: buttons only on upper half, solid lower half -->
  <rect x="92" y="68" width="16" height="90"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Lower half: no opening -->
  <line x1="100" y1="158" x2="100" y2="246" stroke="currentColor" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Buttons only in upper section -->
  <circle cx="100" cy="90"  r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="110" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="130" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="150" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- End stop bar -->
  <line x1="88" y1="158" x2="112" y2="158" stroke="currentColor" stroke-width="2"/>
</svg>
