<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Standard placket: visible folded strip with buttons down center front -->
  <rect x="92" y="68" width="16" height="178"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Placket fold line -->
  <line x1="100" y1="68" x2="100" y2="246" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,3"/>
  <!-- Buttons -->
  <circle cx="100" cy="95"  r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="120" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="145" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="170" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="195" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="220" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
</svg>
