<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Asymmetric hem: one side longer than the other, diagonal cut -->
  <path d="M40,238 L160,250 L160,260 L40,248 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <line x1="40" y1="238" x2="160" y2="250" stroke="currentColor" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Diagonal hem guide arrow indicators -->
  <line x1="70" y1="235" x2="130" y2="248" stroke="currentColor" stroke-width="0.75" stroke-dasharray="2,4"/>
</svg>
