<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Puff sleeves: dramatically gathered/puffed at shoulder, narrow below -->
  <!-- Left puff sleeve: balloon shape at top, narrowing down -->
