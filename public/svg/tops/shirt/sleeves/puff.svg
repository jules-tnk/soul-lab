    fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Gather line at bottom of puff -->
  <path d="M30,108 Q50,116 68,110" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,2" fill="none"/>
  <!-- Right puff sleeve -->
  <path d="M140,65 Q160,68 178,85 Q182,100 170,108 Q162,114 150,112 L144,200 L130,200 L132,110 Q122,108 122,95 Q120,75 140,65 Z"
    fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M170,108 Q150,116 132,110" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,2" fill="none"/>
</svg>
