<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Bishop sleeves: wide, flowing, voluminous through the length, gathered tightly at cuff -->
  <!-- Left bishop sleeve: narrow at shoulder, billows wide, gathers at wrist -->
  <path d="M60,65 L30,90 L24,110 L35,118 Q28,150 22,185 Q30,200 50,198 Q65,196 68,185 Q72,150 68,115 L72,90 L60,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Gather marks at wrist -->
  <path d="M22,185 Q36,194 68,185" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,2" fill="none"/>
  <!-- Volume suggestion lines -->
  <path d="M28,140 Q20,155 22,170" stroke="currentColor" stroke-width="0.75" stroke-dasharray="2,3" fill="none"/>
  <!-- Right bishop sleeve -->
  <path d="M140,65 L170,90 L176,110 L165,118 Q172,150 178,185 Q170,200 150,198 Q135,196 132,185 Q128,150 132,115 L128,90 L140,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M178,185 Q164,194 132,185" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,2" fill="none"/>
  <path d="M172,140 Q180,155 178,170" stroke="currentColor" stroke-width="0.75" stroke-dasharray="2,3" fill="none"/>
</svg>
