<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Cap sleeves: very short, just covering the shoulder curve, not reaching the arm -->
  <!-- Left cap sleeve: small cap over shoulder -->
  <path d="M60,65 Q44,66 36,76 Q32,84 38,90 Q50,96 66,88 L72,90 L60,65 Z"
    fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right cap sleeve -->
  <path d="M140,65 Q156,66 164,76 Q168,84 162,90 Q150,96 134,88 L128,90 L140,65 Z"
    fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Cap hem edge -->
  <path d="M38,90 Q52,98 66,88" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <path d="M162,90 Q148,98 134,88" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
</svg>
