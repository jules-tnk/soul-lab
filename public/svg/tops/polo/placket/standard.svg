<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Standard polo placket: short 2-3 button placket at center front neckline -->
  <rect x="93" y="72" width="14" height="68"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Placket fold line -->
  <line x1="100" y1="72" x2="100" y2="140" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,3"/>
  <!-- 3 buttons -->
  <circle cx="100" cy="88"  r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="108" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="100" cy="128" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
</svg>
