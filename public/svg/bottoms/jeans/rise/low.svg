<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Low rise jeans: waistband below hip bone, short rise -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Jeans silhouette shifted down -->
    <path d="M63,60 L137,60 L142,100 L100,110 L58,100 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M58,100 L100,110 L95,200 L52,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M100,110 L142,100 L148,200 L106,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Denim waistband low -->
    <rect x="63" y="55" width="74" height="12" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="65" y1="58" x2="135" y2="58" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="65" y1="64" x2="135" y2="64" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hip area exposed above -->
    <path d="M68,38 Q100,32 132,38 L137,55 L63,55 Z" fill-opacity="0.03" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Rise indicator: short -->
    <line x1="155" y1="61" x2="155" y2="110" stroke-width="1.5"/>
    <line x1="151" y1="61" x2="159" y2="61" stroke-width="1.5"/>
    <line x1="151" y1="110" x2="159" y2="110" stroke-width="1.5"/>
    <!-- Guide lines -->
    <line x1="100" y1="110" x2="158" y2="110" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="61" x2="158" y2="61" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
