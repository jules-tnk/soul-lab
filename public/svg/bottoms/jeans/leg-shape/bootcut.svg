<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Bootcut jeans: slim through thigh, gentle flare from knee down -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Body -->
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: fitted thigh, bootcut flare at knee -->
    <path d="M62,90 L100,102 L94,170 L82,262 L54,262 L62,170 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: fitted thigh, bootcut flare at knee -->
    <path d="M100,102 L138,90 L138,170 L146,262 L118,262 L106,170 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Denim waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="38" x2="130" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="70" y1="42" x2="130" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hem showing bootcut width -->
    <line x1="54" y1="262" x2="82" y2="262" stroke-width="1.5"/>
    <line x1="118" y1="262" x2="146" y2="262" stroke-width="1.5"/>
    <!-- Inseam -->
    <line x1="100" y1="104" x2="94" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="104" x2="106" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
