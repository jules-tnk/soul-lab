<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Slim leg jeans: close fit through thigh, slight taper to ankle -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Body -->
    <path d="M70,40 L130,40 L135,89 L100,100 L65,89 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: slim with slight taper -->
    <path d="M65,89 L100,100 L92,262 L60,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: slim with slight taper -->
    <path d="M100,100 L135,89 L140,262 L108,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Denim waistband -->
    <rect x="70" y="35" width="60" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="72" y1="38" x2="128" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="72" y1="42" x2="128" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hem -->
    <line x1="60" y1="262" x2="92" y2="262" stroke-width="1.5"/>
    <line x1="108" y1="262" x2="140" y2="262" stroke-width="1.5"/>
    <!-- Inseam -->
    <line x1="100" y1="102" x2="92" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="102" x2="108" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
