<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Skinny jeans: very tight through thigh and leg, tapers to narrow ankle -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Body -->
    <path d="M72,40 L128,40 L133,88 L100,98 L67,88 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: very narrow taper -->
    <path d="M67,88 L100,98 L88,262 L68,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: very narrow taper -->
    <path d="M100,98 L133,88 L132,262 L112,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Denim waistband -->
    <rect x="72" y="35" width="56" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="74" y1="38" x2="126" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="74" y1="42" x2="126" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Narrow hem lines -->
    <line x1="68" y1="262" x2="88" y2="262" stroke-width="1.5"/>
    <line x1="112" y1="262" x2="132" y2="262" stroke-width="1.5"/>
    <!-- Inseam -->
    <line x1="100" y1="100" x2="90" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="100" x2="110" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
