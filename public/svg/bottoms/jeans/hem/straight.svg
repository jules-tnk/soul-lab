<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Straight jeans hem: clean factory hem with double stitch -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Leg sections -->
    <path d="M55,220 L90,220 L90,265 L55,265 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M110,220 L145,220 L145,265 L110,265 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Straight hem lines -->
    <line x1="55" y1="265" x2="90" y2="265" stroke-width="2"/>
    <line x1="110" y1="265" x2="145" y2="265" stroke-width="2"/>
    <!-- Double stitch (denim style) -->
    <line x1="57" y1="259" x2="88" y2="259" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="57" y1="262" x2="88" y2="262" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="112" y1="259" x2="143" y2="259" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="112" y1="262" x2="143" y2="262" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
