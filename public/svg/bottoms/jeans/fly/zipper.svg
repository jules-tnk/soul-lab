<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Jeans zipper fly: center front with YKK-style zipper and copper rivet at top -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Jeans front body context -->
    <path d="M68,40 L132,40 L136,90 L100,100 L64,90 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Denim waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="38" x2="130" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="70" y1="42" x2="130" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Fly placket outline -->
    <path d="M95,45 L105,45 L106,88 L94,88 Z" fill-opacity="0.07" stroke-width="1"/>
    <!-- J-stitch fly stitching -->
    <path d="M104,46 L104,82 Q104,88 97,88" fill="none" stroke-width="1.5"/>
    <!-- Zipper teeth (alternating offset) -->
    <line x1="98" y1="50" x2="102" y2="50" stroke-width="1"/>
    <line x1="98" y1="54" x2="102" y2="54" stroke-width="1"/>
    <line x1="98" y1="58" x2="102" y2="58" stroke-width="1"/>
    <line x1="98" y1="62" x2="102" y2="62" stroke-width="1"/>
    <line x1="98" y1="66" x2="102" y2="66" stroke-width="1"/>
    <line x1="98" y1="70" x2="102" y2="70" stroke-width="1"/>
    <line x1="98" y1="74" x2="102" y2="74" stroke-width="1"/>
    <!-- Zipper pull -->
    <rect x="97" y="46" width="6" height="5" fill-opacity="0.08" stroke-width="1"/>
    <line x1="100" y1="48" x2="100" y2="52" stroke-width="1"/>
    <!-- Top button (jeans style) -->
    <circle cx="100" cy="42" r="3" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Rivet at top of fly -->
    <circle cx="96" cy="46" r="1.5" fill-opacity="0.1" stroke-width="1"/>
  </g>
</svg>
