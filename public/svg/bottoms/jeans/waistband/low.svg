<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Low jeans waistband: sits below hip bone, narrow band -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Low narrow waistband body -->
    <rect x="62" y="50" width="76" height="12" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Top stitch -->
    <line x1="64" y1="53" x2="136" y2="53" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Bottom stitch -->
    <line x1="64" y1="59" x2="136" y2="59" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Belt loops (shorter) -->
    <rect x="72" y="48" width="5" height="16" fill-opacity="0.08" stroke-width="1"/>
    <line x1="73" y1="50" x2="76" y2="50" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="73" y1="63" x2="76" y2="63" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="96" y="48" width="5" height="16" fill-opacity="0.08" stroke-width="1"/>
    <line x1="97" y1="50" x2="100" y2="50" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="97" y1="63" x2="100" y2="63" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="120" y="48" width="5" height="16" fill-opacity="0.08" stroke-width="1"/>
    <line x1="121" y1="50" x2="124" y2="50" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="121" y1="63" x2="124" y2="63" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- Hip area above waistband (exposed) -->
    <path d="M66,35 Q100,28 134,35 L138,50 L62,50 Z" fill-opacity="0.03" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Jeans body suggestion below -->
    <path d="M62,62 L138,62 L144,96 L100,102 L56,96 Z" fill-opacity="0.04" stroke-width="1"/>
  </g>
</svg>
