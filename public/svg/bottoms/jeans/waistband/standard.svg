<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Standard jeans waistband: medium-width, belt loops, rivets at corners -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Waistband body -->
    <rect x="60" y="35" width="80" height="16" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Top stitch -->
    <line x1="62" y1="38" x2="138" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Bottom stitch -->
    <line x1="62" y1="48" x2="138" y2="48" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Belt loops (denim style, wider) -->
    <rect x="70" y="33" width="6" height="20" fill-opacity="0.08" stroke-width="1"/>
    <line x1="71" y1="35" x2="75" y2="35" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="71" y1="51" x2="75" y2="51" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="94" y="33" width="6" height="20" fill-opacity="0.08" stroke-width="1"/>
    <line x1="95" y1="35" x2="99" y2="35" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="95" y1="51" x2="99" y2="51" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="118" y="33" width="6" height="20" fill-opacity="0.08" stroke-width="1"/>
    <line x1="119" y1="35" x2="123" y2="35" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="119" y1="51" x2="123" y2="51" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- Rivets at loop bases -->
    <circle cx="73" cy="51" r="2" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="97" cy="51" r="2" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="121" cy="51" r="2" fill-opacity="0.08" stroke-width="1"/>
    <!-- Jeans body suggestion -->
    <path d="M60,51 L140,51 L145,90 L100,96 L55,90 Z" fill-opacity="0.04" stroke-width="1"/>
  </g>
</svg>
