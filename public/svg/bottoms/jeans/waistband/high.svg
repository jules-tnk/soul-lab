<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- High jeans waistband: tall band sitting above natural waist -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Tall waistband body -->
    <rect x="60" y="22" width="80" height="28" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Top stitch -->
    <line x1="62" y1="25" x2="138" y2="25" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Mid stitch -->
    <line x1="62" y1="36" x2="138" y2="36" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Bottom stitch -->
    <line x1="62" y1="47" x2="138" y2="47" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Belt loops (tall) -->
    <rect x="70" y="20" width="6" height="32" fill-opacity="0.08" stroke-width="1"/>
    <line x1="71" y1="22" x2="75" y2="22" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="71" y1="50" x2="75" y2="50" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="94" y="20" width="6" height="32" fill-opacity="0.08" stroke-width="1"/>
    <line x1="95" y1="22" x2="99" y2="22" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="95" y1="50" x2="99" y2="50" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="118" y="20" width="6" height="32" fill-opacity="0.08" stroke-width="1"/>
    <line x1="119" y1="22" x2="123" y2="22" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="119" y1="50" x2="123" y2="50" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- Rivets -->
    <circle cx="73" cy="50" r="2" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="97" cy="50" r="2" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="121" cy="50" r="2" fill-opacity="0.08" stroke-width="1"/>
    <!-- Jeans body suggestion -->
    <path d="M60,50 L140,50 L145,90 L100,96 L55,90 Z" fill-opacity="0.04" stroke-width="1"/>
  </g>
</svg>
