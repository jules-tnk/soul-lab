<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Patch pockets jeans: large patch pockets on hip/thigh -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Jeans body context -->
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M62,90 L100,102 L95,200 L55,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M100,102 L138,90 L145,200 L105,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Denim waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="38" x2="130" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="70" y1="42" x2="130" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left patch pocket -->
    <rect x="58" y="62" width="28" height="32" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Left patch stitch (inset) -->
    <rect x="60" y="64" width="24" height="28" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left pocket arc stitching (signature) -->
    <path d="M60,72 Q72,64 84,72" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Right patch pocket -->
    <rect x="114" y="62" width="28" height="32" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Right patch stitch (inset) -->
    <rect x="116" y="64" width="24" height="28" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Right pocket arc stitching -->
    <path d="M116,72 Q128,64 140,72" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Rivets at top corners -->
    <circle cx="58" cy="62" r="1.5" fill-opacity="0.1" stroke-width="1"/>
    <circle cx="86" cy="62" r="1.5" fill-opacity="0.1" stroke-width="1"/>
    <circle cx="114" cy="62" r="1.5" fill-opacity="0.1" stroke-width="1"/>
    <circle cx="142" cy="62" r="1.5" fill-opacity="0.1" stroke-width="1"/>
  </g>
</svg>
