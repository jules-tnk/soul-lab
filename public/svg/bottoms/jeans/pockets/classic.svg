<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Classic 5-pocket jeans: 2 front slash, 2 back patch, 1 coin pocket -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Jeans body context -->
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M62,90 L100,102 L95,200 L55,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M100,102 L138,90 L145,200 L105,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Denim waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="38" x2="130" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="70" y1="42" x2="130" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left front slash pocket -->
    <path d="M68,50 L80,66 L62,90 L62,64 Z" fill-opacity="0.06" stroke-width="1"/>
    <line x1="68" y1="50" x2="80" y2="66" stroke-width="1.5"/>
    <!-- Left pocket stitch -->
    <line x1="70" y1="52" x2="79" y2="64" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Coin pocket (right side, small) -->
    <path d="M122" y1="50" x2="132" y2="50 L132,62 L122,62" fill-opacity="0" stroke-width="0"/>
    <path d="M119,50 L130,50 L130,62 L120,62 Z" fill-opacity="0.06" stroke-width="1"/>
    <line x1="119" y1="50" x2="130" y2="50" stroke-width="1.5"/>
    <!-- Coin pocket stitch -->
    <line x1="120" y1="52" x2="129" y2="52" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Right front slash pocket -->
    <line x1="132" y1="50" x2="120" y2="66" stroke-width="1.5"/>
    <line x1="130" y1="52" x2="121" y2="64" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Back patch pockets (shown as ghost behind) -->
    <rect x="64" y="58" width="22" height="26" fill-opacity="0.04" stroke-width="1" stroke-dasharray="2,3"/>
    <rect x="114" y="58" width="22" height="26" fill-opacity="0.04" stroke-width="1" stroke-dasharray="2,3"/>
    <!-- Back pocket arc stitch (signature denim detail) -->
    <path d="M66,64 Q75,58 84,64" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M116,64 Q125,58 134,64" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Rivets at pocket corners -->
    <circle cx="68" cy="50" r="1.5" fill-opacity="0.1" stroke-width="1"/>
    <circle cx="132" cy="50" r="1.5" fill-opacity="0.1" stroke-width="1"/>
  </g>
</svg>
