<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- No pockets jeans: completely clean front and back, no pocket details -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Clean jeans body -->
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M62,90 L100,102 L95,200 L55,200 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M100,102 L138,90 L145,200 L105,200 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Denim waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="38" x2="130" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="70" y1="42" x2="130" y2="42" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Side seams only — completely clean face -->
    <line x1="62" y1="90" x2="57" y2="198" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="138" y1="90" x2="144" y2="198" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Inseam -->
    <line x1="100" y1="104" x2="94" y2="198" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="104" x2="106" y2="198" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
