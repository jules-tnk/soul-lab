<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Patch pockets: square/rectangular patch sewn onto hip area -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser body context -->
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M62,90 L100,102 L95,180 L55,180 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M100,102 L138,90 L145,180 L105,180 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="41" x2="130" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left patch pocket -->
    <rect x="58" y="65" width="24" height="28" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Left pocket stitch (inset) -->
    <rect x="60" y="67" width="20" height="24" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Right patch pocket -->
    <rect x="118" y="65" width="24" height="28" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Right pocket stitch (inset) -->
    <rect x="120" y="67" width="20" height="24" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
