<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Cargo pockets: large bellowed patch pockets with flap on thigh -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser body context -->
    <path d="M65,40 L135,40 L140,90 L100,102 L60,90 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M60,90 L100,102 L92,240 L48,240 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M100,102 L140,90 L152,240 L108,240 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Waistband -->
    <rect x="65" y="35" width="70" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="67" y1="41" x2="133" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left cargo pocket (thigh area) -->
    <rect x="50" y="120" width="34" height="40" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Left pocket flap -->
    <rect x="50" y="120" width="34" height="10" fill-opacity="0.07" stroke-width="1"/>
    <line x1="52" y1="128" x2="82" y2="128" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left pocket bellows crease -->
    <line x1="50" y1="135" x2="84" y2="135" stroke-width="1" stroke-dasharray="2,3"/>
    <!-- Left button on flap -->
    <circle cx="67" cy="124" r="2" fill-opacity="0.08" stroke-width="1"/>
    <!-- Right cargo pocket (thigh area) -->
    <rect x="116" y="120" width="34" height="40" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Right pocket flap -->
    <rect x="116" y="120" width="34" height="10" fill-opacity="0.07" stroke-width="1"/>
    <line x1="118" y1="128" x2="148" y2="128" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Right pocket bellows crease -->
    <line x1="116" y1="135" x2="150" y2="135" stroke-width="1" stroke-dasharray="2,3"/>
    <!-- Right button on flap -->
    <circle cx="133" cy="124" r="2" fill-opacity="0.08" stroke-width="1"/>
  </g>
</svg>
