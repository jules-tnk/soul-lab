<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Relaxed fit trousers: extra room through hip and thigh -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Main body -->
    <path d="M62,40 L138,40 L146,92 L100,106 L54,92 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Left leg -->
    <path d="M54,92 L100,106 L93,260 L48,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Right leg -->
    <path d="M100,106 L146,92 L152,260 L107,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Waistband -->
    <rect x="62" y="35" width="76" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Waistband stitch -->
    <line x1="64" y1="41" x2="136" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Inseam stitch -->
    <line x1="100" y1="108" x2="92" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="108" x2="108" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
