<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Slim fit trousers: narrow through hip and thigh, close to leg -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Main body: waistband to crotch -->
    <path d="M72,40 L128,40 L132,90 L100,100 L68,90 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Left leg: slim, straight narrow -->
    <path d="M68,90 L100,100 L97,260 L60,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Right leg: slim, straight narrow -->
    <path d="M100,100 L132,90 L140,260 L103,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Waistband -->
    <rect x="72" y="35" width="56" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Waistband stitch -->
    <line x1="74" y1="41" x2="126" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Inseam stitch -->
    <line x1="100" y1="102" x2="96" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="102" x2="104" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
