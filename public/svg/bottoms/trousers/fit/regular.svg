<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Regular fit trousers: standard roominess through hip, thigh, leg -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Main body -->
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Left leg -->
    <path d="M62,90 L100,102 L95,260 L55,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Right leg -->
    <path d="M100,102 L138,90 L145,260 L105,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Waistband stitch -->
    <line x1="70" y1="41" x2="130" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Inseam stitch -->
    <line x1="100" y1="104" x2="94" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="104" x2="106" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
