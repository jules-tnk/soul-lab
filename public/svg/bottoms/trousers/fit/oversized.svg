<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Oversized fit trousers: very wide through hip, thigh, and leg -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Main body -->
    <path d="M55,40 L145,40 L155,95 L100,110 L45,95 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Left leg -->
    <path d="M45,95 L100,110 L90,260 L38,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Right leg -->
    <path d="M100,110 L155,95 L162,260 L110,260 Z" fill-opacity="0.07" stroke-width="1.5" fill="currentColor" stroke="currentColor"/>
    <!-- Waistband -->
    <rect x="55" y="35" width="90" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Waistband stitch -->
    <line x1="57" y1="41" x2="143" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Inseam stitch -->
    <line x1="100" y1="112" x2="89" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="112" x2="111" y2="258" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
