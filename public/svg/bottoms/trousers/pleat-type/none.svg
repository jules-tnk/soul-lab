<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- No pleats: flat front, smooth fabric from waistband -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser front body context -->
    <path d="M68,40 L132,40 L136,90 L100,100 L64,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="41" x2="130" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Smooth flat front — crease line only down center of each leg -->
    <line x1="77" y1="50" x2="74" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="123" y1="50" x2="126" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Inseam point -->
    <path d="M64,90 L100,100 L136,90" fill="none" stroke-width="1"/>
  </g>
</svg>
