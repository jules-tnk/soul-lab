<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Double pleat: two folds on each side of center front -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser front body context -->
    <path d="M64,40 L136,40 L140,92 L100,103 L60,92 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="64" y="35" width="72" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="66" y1="41" x2="134" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left outer pleat -->
    <line x1="80" y1="45" x2="76" y2="70" stroke-width="1.5"/>
    <path d="M80,45 L84,45 L80,70 L76,70 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Left inner pleat (closer to center) -->
    <line x1="90" y1="45" x2="87" y2="68" stroke-width="1.5"/>
    <path d="M90,45 L93,45 L90,68 L87,68 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Right outer pleat -->
    <line x1="120" y1="45" x2="124" y2="70" stroke-width="1.5"/>
    <path d="M120,45 L116,45 L120,70 L124,70 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Right inner pleat (closer to center) -->
    <line x1="110" y1="45" x2="113" y2="68" stroke-width="1.5"/>
    <path d="M110,45 L107,45 L110,68 L113,68 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Press crease lines -->
    <line x1="78" y1="70" x2="76" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="122" y1="70" x2="124" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
</svg>
