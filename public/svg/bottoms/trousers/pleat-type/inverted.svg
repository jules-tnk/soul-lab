<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Inverted pleat: fold faces toward center seam (box pleat style) -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser front body context -->
    <path d="M66,40 L134,40 L138,92 L100,102 L62,92 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="66" y="35" width="68" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="68" y1="41" x2="132" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left inverted pleat: fold faces center -->
    <line x1="85" y1="45" x2="89" y2="72" stroke-width="1.5"/>
    <!-- Left pleat shadow showing fold toward center -->
    <path d="M85,45 L81,45 L85,72 L89,72 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Left inverted pleat inner line -->
    <line x1="89" y1="45" x2="89" y2="72" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Right inverted pleat: fold faces center -->
    <line x1="115" y1="45" x2="111" y2="72" stroke-width="1.5"/>
    <!-- Right pleat shadow showing fold toward center -->
    <path d="M115,45 L119,45 L115,72 L111,72 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Right inverted pleat inner line -->
    <line x1="111" y1="45" x2="111" y2="72" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Press crease lines -->
    <line x1="87" y1="72" x2="85" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="113" y1="72" x2="115" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
</svg>
