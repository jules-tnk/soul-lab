<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Single pleat: one fold on each side of center front -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser front body context -->
    <path d="M66,40 L134,40 L138,92 L100,102 L62,92 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="66" y="35" width="68" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="68" y1="41" x2="132" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Left single pleat: fold line from waistband -->
    <line x1="86" y1="45" x2="82" y2="72" stroke-width="1.5"/>
    <!-- Left pleat fold shadow -->
    <path d="M86,45 L90,45 L86,72 L82,72 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Right single pleat: fold line from waistband -->
    <line x1="114" y1="45" x2="118" y2="72" stroke-width="1.5"/>
    <!-- Right pleat fold shadow -->
    <path d="M114,45 L110,45 L114,72 L118,72 Z" fill-opacity="0.06" stroke-width="1"/>
    <!-- Press crease lines -->
    <line x1="80" y1="72" x2="78" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="120" y1="72" x2="122" y2="95" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
</svg>
