<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Button fly: center front with vertical row of buttons -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser front body context -->
    <path d="M68,40 L132,40 L136,90 L100,100 L64,90 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="41" x2="130" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Fly placket -->
    <path d="M96,45 L104,45 L105,88 L95,88 Z" fill-opacity="0.07" stroke-width="1"/>
    <!-- Placket stitch line -->
    <line x1="104" y1="46" x2="104" y2="87" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Buttons (vertical row) -->
    <circle cx="100" cy="43" r="2.5" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="100" cy="52" r="2.5" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="100" cy="61" r="2.5" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="100" cy="70" r="2.5" fill-opacity="0.08" stroke-width="1"/>
    <circle cx="100" cy="79" r="2.5" fill-opacity="0.08" stroke-width="1"/>
    <!-- Button holes -->
    <line x1="98" y1="52" x2="102" y2="52" stroke-width="1"/>
    <line x1="98" y1="61" x2="102" y2="61" stroke-width="1"/>
    <line x1="98" y1="70" x2="102" y2="70" stroke-width="1"/>
    <line x1="98" y1="79" x2="102" y2="79" stroke-width="1"/>
  </g>
</svg>
