<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Wide leg: generous width from hip all the way to hem -->
  <g fill="currentColor" stroke="currentColor">
    <path d="M62,40 L138,40 L146,90 L100,104 L54,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: wide and parallel -->
    <path d="M54,90 L100,104 L92,262 L42,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: wide and parallel -->
    <path d="M100,104 L146,90 L158,262 L108,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="62" y="35" width="76" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="64" y1="41" x2="136" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hem lines -->
    <line x1="42" y1="262" x2="92" y2="262" stroke-width="1.5"/>
    <line x1="108" y1="262" x2="158" y2="262" stroke-width="1.5"/>
    <!-- Side seam stitches -->
    <line x1="51" y1="92" x2="43" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="149" y1="92" x2="157" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
