<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Slim leg shape: narrow through thigh and leg, close fitting -->
  <g fill="currentColor" stroke="currentColor">
    <path d="M70,40 L130,40 L135,90 L100,100 L65,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: slim, slight taper -->
    <path d="M65,90 L100,100 L93,262 L63,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: slim, slight taper -->
    <path d="M100,100 L135,90 L137,262 L107,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="70" y="35" width="60" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="72" y1="41" x2="128" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hem lines -->
    <line x1="63" y1="262" x2="93" y2="262" stroke-width="1.5"/>
    <line x1="107" y1="262" x2="137" y2="262" stroke-width="1.5"/>
    <!-- Side seam stitches -->
    <line x1="63" y1="92" x2="64" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="137" y1="92" x2="136" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
