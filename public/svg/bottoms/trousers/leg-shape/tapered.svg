<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Tapered leg: wide at hip, narrows toward ankle -->
  <g fill="currentColor" stroke="currentColor">
    <path d="M66,40 L134,40 L140,90 L100,102 L60,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: tapers inward toward hem -->
    <path d="M60,90 L100,102 L90,262 L62,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: tapers inward toward hem -->
    <path d="M100,102 L140,90 L138,262 L110,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="66" y="35" width="68" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="68" y1="41" x2="132" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hem lines -->
    <line x1="62" y1="262" x2="90" y2="262" stroke-width="1.5"/>
    <line x1="110" y1="262" x2="138" y2="262" stroke-width="1.5"/>
    <!-- Side seam stitches showing taper -->
    <line x1="58" y1="92" x2="63" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="142" y1="92" x2="137" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
