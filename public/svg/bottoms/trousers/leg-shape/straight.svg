<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Straight leg: consistent width from hip to hem -->
  <g fill="currentColor" stroke="currentColor">
    <path d="M68,40 L132,40 L138,90 L100,102 L62,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Left leg: straight sides -->
    <path d="M62,90 L100,102 L95,262 L55,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Right leg: straight sides -->
    <path d="M100,102 L138,90 L145,262 L105,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Waistband -->
    <rect x="68" y="35" width="64" height="10" fill-opacity="0.08" stroke-width="1.5"/>
    <line x1="70" y1="41" x2="130" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Hem lines -->
    <line x1="55" y1="262" x2="95" y2="262" stroke-width="1.5"/>
    <line x1="105" y1="262" x2="145" y2="262" stroke-width="1.5"/>
    <!-- Side seam stitches -->
    <line x1="58" y1="92" x2="56" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="142" y1="92" x2="144" y2="260" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
