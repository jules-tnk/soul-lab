    <path d="M55,220 L90,220 L90,262 L55,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M110,220 L145,220 L145,262 L110,262 Z" fill-opacity="0.07" stroke-width="1.5"/>
