<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Cropped hem: shorter length, hem sits above ankle -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Leg ending short at mid-calf -->
    <path d="M56,215 L90,215 L90,245 L56,245 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M110,215 L144,215 L144,245 L110,245 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <!-- Clean cropped hem (above normal ankle line) -->
    <line x1="56" y1="245" x2="90" y2="245" stroke-width="2"/>
    <line x1="110" y1="245" x2="144" y2="245" stroke-width="2"/>
    <!-- Stitch line above hem -->
    <line x1="58" y1="241" x2="88" y2="241" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="112" y1="241" x2="142" y2="241" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Indicator showing gap above floor (dashed continuation) -->
    <line x1="60" y1="248" x2="60" y2="268" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="86" y1="248" x2="86" y2="268" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="114" y1="248" x2="114" y2="268" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="140" y1="248" x2="140" y2="268" stroke-width="1" stroke-dasharray="2,4"/>
  </g>
</svg>
