<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Low waistband: narrow band sitting below natural waist -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Low, narrow waistband body -->
    <rect x="62" y="48" width="76" height="12" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Top stitch -->
    <line x1="64" y1="51" x2="136" y2="51" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Bottom stitch -->
    <line x1="64" y1="57" x2="136" y2="57" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Belt loops -->
    <rect x="74" y="46" width="5" height="16" fill-opacity="0.07" stroke-width="1"/>
    <rect x="97" y="46" width="5" height="16" fill-opacity="0.07" stroke-width="1"/>
    <rect x="120" y="46" width="5" height="16" fill-opacity="0.07" stroke-width="1"/>
    <!-- Trouser body suggestion -->
    <path d="M62,60 L138,60 L144,95 L100,100 L56,95 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Hip area suggestion above waistband -->
    <path d="M65,35 Q100,30 135,35 L138,48 L62,48 Z" fill-opacity="0.03" stroke-width="1"/>
  </g>
</svg>
