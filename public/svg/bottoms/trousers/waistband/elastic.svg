<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Elastic waistband: gathered/ruched appearance, no belt loops -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Waistband body -->
    <rect x="60" y="35" width="80" height="18" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Elastic channel stitches (multiple parallel lines) -->
    <line x1="62" y1="38" x2="138" y2="38" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="62" y1="41" x2="138" y2="41" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="62" y1="44" x2="138" y2="44" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="62" y1="47" x2="138" y2="47" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="62" y1="50" x2="138" y2="50" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Gather tucks suggestion -->
    <line x1="72" y1="35" x2="72" y2="53" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="86" y1="35" x2="86" y2="53" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="100" y1="35" x2="100" y2="53" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="114" y1="35" x2="114" y2="53" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="128" y1="35" x2="128" y2="53" stroke-width="1" stroke-dasharray="2,3"/>
    <!-- Trouser body suggestion -->
    <path d="M60,53 L140,53 L145,92 L100,98 L55,92 Z" fill-opacity="0.04" stroke-width="1"/>
  </g>
</svg>
