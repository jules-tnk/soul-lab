<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Ultra-high rise: waistband at or above navel, very long rise -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Trouser silhouette with very high waistband -->
    <path d="M63,22 L137,22 L142,90 L100,102 L58,90 Z" fill-opacity="0.07" stroke-width="1.5"/>
    <path d="M58,90 L100,102 L95,200 L52,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <path d="M100,102 L142,90 L148,200 L106,200 Z" fill-opacity="0.04" stroke-width="1"/>
    <!-- Tall waistband at ultra-high position -->
    <rect x="63" y="17" width="74" height="14" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- Extra stitch line on tall waistband -->
    <line x1="65" y1="24" x2="135" y2="24" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="65" y1="28" x2="135" y2="28" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Rise indicator: very long vertical line -->
    <line x1="155" y1="24" x2="155" y2="102" stroke-width="1.5"/>
    <line x1="151" y1="24" x2="159" y2="24" stroke-width="1.5"/>
    <line x1="151" y1="102" x2="159" y2="102" stroke-width="1.5"/>
    <!-- Dashed guide lines -->
    <line x1="100" y1="102" x2="158" y2="102" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="100" y1="24" x2="158" y2="24" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>
