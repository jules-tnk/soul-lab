<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Zipper closure: center back zipper line with teeth marks -->
  <line x1="100" y1="43" x2="100" y2="90" stroke="currentColor" stroke-width="1.5"/>
  <!-- Zipper teeth -->
  <line x1="97" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="1"/>
  <line x1="103" y1="53" x2="100" y2="53" stroke="currentColor" stroke-width="1"/>
  <line x1="97" y1="56" x2="100" y2="56" stroke="currentColor" stroke-width="1"/>
  <line x1="103" y1="59" x2="100" y2="59" stroke="currentColor" stroke-width="1"/>
  <line x1="97" y1="62" x2="100" y2="62" stroke="currentColor" stroke-width="1"/>
  <line x1="103" y1="65" x2="100" y2="65" stroke="currentColor" stroke-width="1"/>
  <line x1="97" y1="68" x2="100" y2="68" stroke="currentColor" stroke-width="1"/>
  <line x1="103" y1="71" x2="100" y2="71" stroke="currentColor" stroke-width="1"/>
  <!-- Zipper pull -->
  <rect x="97" y="46" width="6" height="4" rx="1" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1"/>
</svg>
