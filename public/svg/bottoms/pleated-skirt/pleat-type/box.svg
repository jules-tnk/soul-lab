<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Box pleats: alternating inverted folds, mirrored pairs -->
  <path d="M68,43 L60,180 L140,180 L132,43 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Box pleat fold marks - pairs of lines meeting at center -->
  <line x1="76" y1="43" x2="80" y2="180" stroke="currentColor" stroke-width="1"/>
  <line x1="84" y1="43" x2="80" y2="180" stroke="currentColor" stroke-width="1"/>
  <line x1="96" y1="43" x2="100" y2="180" stroke="currentColor" stroke-width="1"/>
  <line x1="104" y1="43" x2="100" y2="180" stroke="currentColor" stroke-width="1"/>
  <line x1="116" y1="43" x2="120" y2="180" stroke="currentColor" stroke-width="1"/>
  <line x1="124" y1="43" x2="120" y2="180" stroke="currentColor" stroke-width="1"/>
</svg>
