<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Zipper closure: side or back zipper line with teeth -->
  <line x1="122" y1="43" x2="122" y2="100" stroke="currentColor" stroke-width="1.5"/>
  <!-- Zipper teeth -->
  <line x1="122" y1="52" x2="118" y2="52" stroke="currentColor" stroke-width="1"/>
  <line x1="122" y1="57" x2="126" y2="57" stroke="currentColor" stroke-width="1"/>
  <line x1="122" y1="62" x2="118" y2="62" stroke="currentColor" stroke-width="1"/>
  <line x1="122" y1="67" x2="126" y2="67" stroke="currentColor" stroke-width="1"/>
  <line x1="122" y1="72" x2="118" y2="72" stroke="currentColor" stroke-width="1"/>
  <line x1="122" y1="77" x2="126" y2="77" stroke="currentColor" stroke-width="1"/>
  <line x1="122" y1="82" x2="118" y2="82" stroke="currentColor" stroke-width="1"/>
  <!-- Zipper pull -->
  <rect x="119" y="46" width="6" height="4" rx="1" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1"/>
</svg>
