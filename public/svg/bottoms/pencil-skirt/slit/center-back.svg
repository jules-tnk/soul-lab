<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Center back slit: inverted V at center of hem -->
  <line x1="78" y1="180" x2="94" y2="180" stroke="currentColor" stroke-width="1.5"/>
  <line x1="106" y1="180" x2="122" y2="180" stroke="currentColor" stroke-width="1.5"/>
  <!-- Slit lines angling up from center -->
  <line x1="94" y1="180" x2="100" y2="148" stroke="currentColor" stroke-width="1"/>
  <line x1="106" y1="180" x2="100" y2="148" stroke="currentColor" stroke-width="1"/>
  <!-- Top of slit -->
  <line x1="97" y1="148" x2="103" y2="148" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
