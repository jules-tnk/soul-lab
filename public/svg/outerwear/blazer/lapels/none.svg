<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- No lapels: collarless clean front edge -->
  <!-- Left front edge -->
  <path d="M100,68 L84,72 L82,115 L100,115 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right front edge -->
  <path d="M100,68 L116,72 L118,115 L100,115 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Clean neckline -->
  <path d="M84,72 Q100,66 116,72"
    fill="none" stroke="currentColor" stroke-width="1.5"/>
</svg>
