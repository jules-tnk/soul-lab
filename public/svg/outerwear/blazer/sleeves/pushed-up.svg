<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Pushed-up/rolled sleeves: bunched fabric pushed up the forearm -->
  <!-- Left sleeve upper portion -->
  <path d="M50,115 L28,125 L30,200 L52,200 L54,125 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right sleeve upper portion -->
  <path d="M150,115 L172,125 L170,200 L148,200 L146,125 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left rolled/pushed-up bunched fabric -->
  <path d="M29,185 Q40,180 51,185 Q40,188 29,185 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1"/>
  <path d="M29,192 Q40,187 51,192 Q40,195 29,192 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1"/>
  <!-- Right rolled/pushed-up bunched fabric -->
  <path d="M149,185 Q160,180 171,185 Q160,188 149,185 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1"/>
  <path d="M149,192 Q160,187 171,192 Q160,195 149,192 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1"/>
</svg>
