<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Flap pockets: pockets with a flap cover at hip level -->
  <!-- Left flap pocket -->
  <rect x="58" y="165" width="32" height="20" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left flap -->
  <path d="M58,165 L90,165 L90,172 L74,175 L58,172 Z"
    fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right flap pocket -->
  <rect x="110" y="165" width="32" height="20" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right flap -->
  <path d="M110,165 L142,165 L142,172 L126,175 L110,172 Z"
    fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
  <!-- Flap stitching -->
  <line x1="60" y1="167" x2="88" y2="167" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="112" y1="167" x2="140" y2="167" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
