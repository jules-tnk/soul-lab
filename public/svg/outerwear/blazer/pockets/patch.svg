<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Patch pockets: applied patch pockets stitched to front -->
  <!-- Left patch pocket -->
  <rect x="57" y="163" width="34" height="28" rx="2"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left patch stitching around edge -->
  <rect x="59" y="165" width="30" height="24" rx="1"
    fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Right patch pocket -->
  <rect x="109" y="163" width="34" height="28" rx="2"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right patch stitching around edge -->
  <rect x="111" y="165" width="30" height="24" rx="1"
    fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
