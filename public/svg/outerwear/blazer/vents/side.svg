<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Side vents: two slits at side back seams -->
  <path d="M70,230 L70,240 L74,240 L74,260 L126,260 L126,240 L130,240 L130,230"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left side vent slit -->
  <line x1="70" y1="240" x2="70" y2="260" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right side vent slit -->
  <line x1="130" y1="240" x2="130" y2="260" stroke="currentColor" stroke-width="1.5"/>
  <!-- Vent overlap lines -->
  <line x1="70" y1="240" x2="74" y2="240" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="126" y1="240" x2="130" y2="240" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
