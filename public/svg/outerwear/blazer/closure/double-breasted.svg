<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Double breasted: wide overlap, two rows of buttons -->
  <!-- Wide left overlap panel -->
  <path d="M100,75 L72,82 L68,200 L100,200 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right front panel -->
  <path d="M100,75 L120,82 L122,200 L100,200 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left column of buttons -->
  <circle cx="90" cy="120" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="90" cy="145" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right column of buttons -->
  <circle cx="112" cy="120" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="112" cy="145" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
</svg>
