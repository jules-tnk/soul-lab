<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Snap closure on parka: center front snaps -->
  <!-- Center placket -->
  <rect x="93" y="78" width="14" height="152" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1"/>
  <!-- Snap buttons -->
  <circle cx="100" cy="100" r="5" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="125" r="5" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="150" r="5" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="175" r="5" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="200" r="5" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
  <!-- Center dots -->
  <circle cx="100" cy="100" r="2" fill="currentColor" fill-opacity="0.4"/>
  <circle cx="100" cy="125" r="2" fill="currentColor" fill-opacity="0.4"/>
  <circle cx="100" cy="150" r="2" fill="currentColor" fill-opacity="0.4"/>
  <circle cx="100" cy="175" r="2" fill="currentColor" fill-opacity="0.4"/>
  <circle cx="100" cy="200" r="2" fill="currentColor" fill-opacity="0.4"/>
</svg>
