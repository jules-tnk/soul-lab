<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Detachable hood: hood with snap attachments along neckline -->
  <!-- Hood body -->
  <path d="M68,65 Q100,15 132,65 Q118,72 100,74 Q82,72 68,65 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Hood center seam -->
  <line x1="100" y1="18" x2="100" y2="65" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Snap attachment points along collar seam -->
  <circle cx="74" cy="68" r="3" fill="currentColor" fill-opacity="0.25" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="82" cy="71" r="3" fill="currentColor" fill-opacity="0.25" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="92" cy="73" r="3" fill="currentColor" fill-opacity="0.25" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="108" cy="73" r="3" fill="currentColor" fill-opacity="0.25" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="118" cy="71" r="3" fill="currentColor" fill-opacity="0.25" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="126" cy="68" r="3" fill="currentColor" fill-opacity="0.25" stroke="currentColor" stroke-width="1.5"/>
  <!-- Snap center dots -->
  <circle cx="74" cy="68" r="1" fill="currentColor" fill-opacity="0.5"/>
  <circle cx="100" cy="74" r="1" fill="currentColor" fill-opacity="0.5"/>
  <circle cx="126" cy="68" r="1" fill="currentColor" fill-opacity="0.5"/>
</svg>
