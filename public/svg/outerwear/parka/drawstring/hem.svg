<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Hem drawstring: cord at hem with toggles -->
  <!-- Hem channel -->
  <path d="M40,225 L160,225 L160,235 L40,235 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1"/>
  <!-- Drawstring cord out at sides -->
  <path d="M40,230 L26,230 L22,240"
    fill="none" stroke="currentColor" stroke-width="1.5"/>
  <path d="M160,230 L174,230 L178,240"
    fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left toggle -->
  <rect x="18" y="239" width="8" height="5" rx="2" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1"/>
  <!-- Right toggle -->
  <rect x="174" y="239" width="8" height="5" rx="2" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1"/>
  <!-- Channel stitching -->
  <line x1="41" y1="227" x2="159" y2="227" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="41" y1="233" x2="159" y2="233" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
