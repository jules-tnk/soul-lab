<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Waist drawstring: cord at waist level with toggles -->
  <!-- Drawstring channel band at waist -->
  <path d="M40,158 L160,158 L160,168 L40,168 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1"/>
  <!-- Drawstring cord coming out at center -->
  <path d="M94,163 L72,163 Q66,163 64,168 L60,180"
    fill="none" stroke="currentColor" stroke-width="1.5"/>
  <path d="M106,163 L128,163 Q134,163 136,168 L140,180"
    fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left cord end toggle -->
  <rect x="56" y="179" width="8" height="5" rx="2" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1"/>
  <!-- Right cord end toggle -->
  <rect x="136" y="179" width="8" height="5" rx="2" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1"/>
  <!-- Channel stitching -->
  <line x1="41" y1="160" x2="159" y2="160" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="41" y1="166" x2="159" y2="166" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
