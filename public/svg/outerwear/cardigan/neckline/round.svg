<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Round neckline cardigan: rounded collar edge -->
  <!-- Neckline arc -->
  <path d="M80,62 Q100,78 120,62"
    fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Neckband (ribbed trim) -->
  <path d="M80,62 Q100,82 120,62 L118,58 Q100,75 82,58 Z"
    fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Inner rib stitch -->
  <path d="M82,60 Q100,76 118,60"
    fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Center opening line -->
  <line x1="100" y1="65" x2="100" y2="80" stroke="currentColor" stroke-width="1"/>
</svg>
