<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Patch pockets on cardigan: sewn-on patch pockets -->
  <!-- Left patch pocket -->
  <rect x="58" y="150" width="32" height="28" rx="2"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left stitching -->
  <rect x="60" y="152" width="28" height="24" rx="1"
    fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Right patch pocket -->
  <rect x="110" y="150" width="32" height="28" rx="2"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right stitching -->
  <rect x="112" y="152" width="28" height="24" rx="1"
    fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
