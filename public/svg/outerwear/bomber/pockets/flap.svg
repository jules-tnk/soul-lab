<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Flap pockets: front pockets with flap at hip level -->
  <!-- Left flap pocket -->
  <rect x="50" y="158" width="36" height="22" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left flap -->
  <path d="M50,158 L86,158 L86,166 L68,169 L50,166 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right flap pocket -->
  <rect x="114" y="158" width="36" height="22" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right flap -->
  <path d="M114,158 L150,158 L150,166 L132,169 L114,166 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <!-- Stitching -->
  <line x1="52" y1="160" x2="84" y2="160" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="116" y1="160" x2="148" y2="160" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
