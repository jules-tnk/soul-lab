<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Snapped cuffs: cuff tab with snap fastener -->
  <!-- Left cuff -->
  <rect x="26" y="210" width="28" height="16" rx="1" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left snap tab -->
  <rect x="44" y="214" width="8" height="8" rx="1" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="48" cy="218" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="48" cy="218" r="1" fill="currentColor" fill-opacity="0.4"/>
  <!-- Left cuff stitching -->
  <line x1="28" y1="212" x2="43" y2="212" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Right cuff -->
  <rect x="146" y="210" width="28" height="16" rx="1" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right snap tab -->
  <rect x="148" y="214" width="8" height="8" rx="1" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="152" cy="218" r="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <circle cx="152" cy="218" r="1" fill="currentColor" fill-opacity="0.4"/>
  <!-- Right cuff stitching -->
  <line x1="157" y1="212" x2="172" y2="212" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
