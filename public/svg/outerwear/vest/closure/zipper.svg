  <line x1="97" y1="100" x2="103" y2="107" stroke="currentColor" stroke-width="1.5"/>
  <line x1="97" y1="118" x2="103" y2="125" stroke="currentColor" stroke-width="1.5"/>
  <line x1="97" y1="136" x2="103" y2="143" stroke="currentColor" stroke-width="1.5"/>
  <line x1="97" y1="154" x2="103" y2="161" stroke="currentColor" stroke-width="1.5"/>
  <line x1="97" y1="172" x2="103" y2="179" stroke="currentColor" stroke-width="1.5"/>
