  <path d="M128,65 Q142,77 156,90" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Hem stitching -->
  <line x1="43" y1="212" x2="157" y2="212" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="100" y1="72" x2="100" y2="215" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
