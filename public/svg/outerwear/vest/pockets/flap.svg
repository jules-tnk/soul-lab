<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Flap pockets on vest -->
  <!-- Left flap pocket -->
  <rect x="50" y="145" width="42" height="24" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left flap -->
  <path d="M50,145 L92,145 L92,153 L71,156 L50,153 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right flap pocket -->
  <rect x="108" y="145" width="42" height="24" rx="1"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right flap -->
  <path d="M108,145 L150,145 L150,153 L129,156 L108,153 Z"
    fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
  <!-- Flap buttons -->
  <circle cx="71" cy="150" r="2.5" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1"/>
  <circle cx="129" cy="150" r="2.5" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1"/>
</svg>
