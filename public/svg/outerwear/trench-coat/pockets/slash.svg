<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Slash pockets on trench: diagonal slit openings -->
  <!-- Left slash pocket -->
  <path d="M55,158 L84,173" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <path d="M55,158 L84,173 L85,170 L56,155 Z"
    fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1"/>
  <!-- Right slash pocket -->
  <path d="M145,158 L116,173" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <path d="M145,158 L116,173 L115,170 L144,155 Z"
    fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1"/>
  <!-- Stitching along slash edges -->
  <line x1="56" y1="159" x2="85" y2="174" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="144" y1="159" x2="115" y2="174" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
