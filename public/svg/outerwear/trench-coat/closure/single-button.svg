<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Single-button trench closure: one row of buttons, narrow overlap -->
  <!-- Left front panel -->
  <path d="M100,75 L84,82 L82,210 L100,210 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right front panel -->
  <path d="M100,75 L116,82 L118,210 L100,210 Z"
    fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="1.5"/>
  <!-- Single row of buttons -->
  <circle cx="100" cy="105" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="130" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="155" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="100" cy="180" r="4" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5"/>
</svg>
